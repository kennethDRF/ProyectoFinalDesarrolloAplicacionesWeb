<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="base(titulo, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | ' + 'Barbex'">Barbex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
        .estado-PENDIENTE { color: #ffc107; }
        .estado-CONFIRMADA { color: #198754; }
        .estado-COMPLETADA { color: #0d6efd; }
        .estado-CANCELADA { color: #6c757d; }
        .estado-RECHAZADA { color: #dc3545; }
        .cita-vencida { background-color: #fff3cd !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:if="${session.usuario != null}">
        <div class="container">
            <a class="navbar-brand" href="#" th:href="@{/}">
                <i class="bi bi-scissors"></i> <span>Barbex</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'BARBERO'}">
                        <a class="nav-link" th:href="@{/barbero/dashboard}">Citas</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'BARBERO'}">
                        <a class="nav-link" th:href="@{/barbero/servicios}">Servicios</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'BARBERO'}">
                        <a class="nav-link" th:href="@{/barbero/horarios}">Horarios</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'BARBERO'}">
                        <a class="nav-link" th:href="@{/barbero/solicitudes}">Solicitudes</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'CLIENTE'}">
                        <a class="nav-link" th:href="@{/cliente/dashboard}">Citas</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuario.rol.name() == 'CLIENTE'}">
                        <a class="nav-link" th:href="@{/cliente/citas/nueva}">Nueva cita</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="navbar-text me-3" th:text="${session.usuario.nombreCompleto}">Usuario</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/logout}">Cerrar sesion</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Toast de mensajes -->
        <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="toastOk" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true" th:if="${ok}">
                <div class="d-flex">
                    <div class="toast-body" th:text="${ok}">Operacion exitosa</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
            <div id="toastError" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true" th:if="${error}">
                <div class="d-flex">
                    <div class="toast-body" th:text="${error}">Ha ocurrido un error</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <div th:replace="${content}"></div>
    </main>

    <!-- Modal de confirmacion generico -->
    <div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar accion</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modalConfirmacionMensaje">Esta seguro?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="modalConfirmacionAceptar">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light text-center py-3 mt-auto">
        <div class="container">
            <small th:text="'Barbex' + ' - ' + 'Sistema de gestion de barberia'">Barbex</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mostrar toasts automaticamente
        document.addEventListener('DOMContentLoaded', function() {
            const toastOk = document.getElementById('toastOk');
            const toastError = document.getElementById('toastError');
            if (toastOk) new bootstrap.Toast(toastOk, { delay: 5000 }).show();
            if (toastError) new bootstrap.Toast(toastError, { delay: 8000 }).show();
        });

        // Modal de confirmacion generico
        let formConfirmacion = null;
        function confirmarAccion(mensaje, formId) {
            document.getElementById('modalConfirmacionMensaje').textContent = mensaje;
            formConfirmacion = document.getElementById(formId);
            const modal = new bootstrap.Modal(document.getElementById('modalConfirmacion'));
            modal.show();
        }

        document.getElementById('modalConfirmacionAceptar').addEventListener('click', function() {
            if (formConfirmacion) {
                formConfirmacion.submit();
            }
        });
    </script>
</body>
</html>
