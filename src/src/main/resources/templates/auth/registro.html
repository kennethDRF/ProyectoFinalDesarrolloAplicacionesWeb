<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Crear cuenta' + ' | ' + 'Barbex'">Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-scissors display-4 text-primary"></i>
                            <h2>Crear cuenta</h2>
                        </div>

                        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                        <form th:action="@{/registro}" th:object="${usuario}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{email}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Contrasena</label>
                                    <input type="password" th:field="*{password}" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{password}"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre completo</label>
                                    <input type="text" th:field="*{nombreCompleto}" class="form-control" th:classappend="${#fields.hasErrors('nombreCompleto')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{nombreCompleto}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Telefono</label>
                                    <input type="text" th:field="*{telefono}" class="form-control" th:classappend="${#fields.hasErrors('telefono')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{telefono}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de usuario</label>
                                <select th:field="*{rol}" class="form-select" id="rolSelect">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                                </select>
                            </div>

                            <div class="mb-3" id="barberiaSeleccionContainer">
                                <label class="form-label">Seleccionar barberia</label>
                                <select id="barberiaTipo" class="form-select mb-2">
                                    <option value="nueva" id="opcionNueva">Nueva barberia</option>
                                    <option value="existente">Barberia existente</option>
                                </select>

                                <div id="nuevaBarberia">
                                    <input type="text" name="nombreBarberia" class="form-control mb-2" placeholder="Nombre de la barberia">
                                    <input type="text" name="direccionBarberia" class="form-control mb-2" placeholder="Direccion">
                                    <input type="text" name="telefonoBarberia" class="form-control" placeholder="Telefono">
                                </div>

                                <div id="barberiaExistente" class="d-none">
                                    <select name="barberiaId" class="form-select">
                                        <option value="">Seleccione</option>
                                        <option th:each="b : ${barberias}" th:value="${b.id}" th:text="${b.id + ' - ' + b.nombre}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Registrate</button>
                                <a th:href="@{/login}" class="btn btn-outline-secondary">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const rolSelect = document.getElementById('rolSelect');
        const barberiaTipo = document.getElementById('barberiaTipo');
        const opcionNueva = document.getElementById('opcionNueva');
        const nuevaBarberia = document.getElementById('nuevaBarberia');
        const barberiaExistente = document.getElementById('barberiaExistente');

        function actualizarVistaPorRol() {
            const rol = rolSelect.value;
            if (rol === 'CLIENTE') {
                // Los clientes solo pueden unirse a una barberia existente
                opcionNueva.classList.add('d-none');
                if (barberiaTipo.value === 'nueva') {
                    barberiaTipo.value = 'existente';
                }
            } else {
                opcionNueva.classList.remove('d-none');
            }
            actualizarVistaBarberia();
        }

        function actualizarVistaBarberia() {
            if (barberiaTipo.value === 'nueva') {
                nuevaBarberia.classList.remove('d-none');
                barberiaExistente.classList.add('d-none');
            } else {
                nuevaBarberia.classList.add('d-none');
                barberiaExistente.classList.remove('d-none');
            }
        }

        rolSelect.addEventListener('change', actualizarVistaPorRol);
        barberiaTipo.addEventListener('change', actualizarVistaBarberia);

        // Inicializar
        actualizarVistaPorRol();
    </script>
</body>
</html>
